<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 58px; /* A2, A3 အကွက်ထဲဝင်အောင် gap ကို 58px သို့ တိုးထားသည် */
            padding-top: 45px; /* A1 အကွက်ထဲဝင်အောင် padding-top ကို 45px သို့ လျှော့ထားသည် */
            align-items: center;
        }
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 380px;
        }
        .title { font-size: 18px; color: #333; font-weight: bold; margin-bottom: 3px; }
        .val { font-size: 75px; font-weight: bold; line-height: 0.9; }
    </style>
    <script>
        const sheetID = '1WTAqnW15uaT_Cr-9pcr8zTlBxCM6WXm3yV2dK4Iymlg';
        const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
        async function updateData() {
            try {
                const response = await fetch(csvURL + '&cache_bus=' + Date.now());
                const text = await response.text();
                const rows = text.split('\n').map(v => v.replace(/"/g, '').trim());
                document.getElementById('v1').innerText = rows[0] || '---';
                document.getElementById('v2').innerText = rows[1] || '--';
                document.getElementById('v3').innerText = rows[2] || '--';
            } catch (error) {}
        }
        setInterval(updateData, 3000);
        updateData();
    </script>
</head>
